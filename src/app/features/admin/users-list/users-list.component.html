<div class="flex flex-col gap-5">
  <!-- Header -->
  <header class="flex flex-col gap-1">
    <h1 class="text-2xl font-bold text-primary-900">Manajemen Pengguna</h1>
    <p class="text-sm text-slate-500">
      Daftar pengguna sistem ARMADIN dengan informasi role dan status aktif.
    </p>
  </header>

  <!-- Tabel Users -->
  <div class="armadin-table-wrap">
    <p-table
      [value]="users()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      dataKey="id"
      [rowHover]="true"
      [stripedRows]="true"
      currentPageReportTemplate="{first}–{last} dari {totalRecords} pengguna"
      [showCurrentPageReport]="true"
      responsiveLayout="scroll"
      styleClass="text-sm"
    >
      <ng-template #header>
        <tr>
          <th class="w-48">Username</th>
          <th>Nama Lengkap</th>
          <th class="w-40">Role</th>
          <th class="w-32">Status</th>
          <th class="w-48">Login Terakhir</th>
          <th class="w-32 text-right">Aksi</th>
        </tr>
      </ng-template>

      <ng-template #body let-user>
        <tr>
          <td class="font-mono text-sm font-semibold text-primary-700">
            {{ user.username }}
          </td>
          <td class="text-slate-700">{{ user.fullName }}</td>
          <td>
            <p-chip
              [label]="user.role"
              styleClass="text-xs font-medium"
            ></p-chip>
          </td>
          <td>
            <p-tag
              [value]="user.isActive ? 'Aktif' : 'Nonaktif'"
              [severity]="user.isActive ? 'success' : 'secondary'"
              [rounded]="true"
            ></p-tag>
          </td>
          <td class="text-xs text-slate-500">
            {{ formatDateTime(user.lastLoginAt) }}
          </td>
          <td class="text-right">
            <div class="flex items-center justify-end gap-1">
              <p-button
                icon="pi pi-pencil"
                severity="secondary"
                [text]="true"
                [rounded]="true"
                size="small"
                pTooltip="Edit pengguna"
                (onClick)="onEdit(user)"
              ></p-button>
              <p-button
                icon="pi pi-ban"
                severity="danger"
                [text]="true"
                [rounded]="true"
                size="small"
                pTooltip="Nonaktifkan pengguna"
                (onClick)="onDisable(user)"
              ></p-button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template #emptymessage>
        <tr>
          <td colspan="6" class="py-10 text-center text-sm text-slate-500">
            Tidak ada data pengguna.
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-toast></p-toast>
