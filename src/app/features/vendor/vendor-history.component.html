<section class="flex flex-col gap-5">
  <app-page-header title="Riwayat Work Order" subtitle="Daftar Work Order yang telah diselesaikan." />

  <div class="flex gap-3 flex-wrap">
    <input pInputText [(ngModel)]="filterNomor" placeholder="Cari nomor WO / plat..." class="w-60" />
    <p-multiselect [(ngModel)]="filterStatus" [options]="statusOpts" optionLabel="label" optionValue="value"
      placeholder="Filter status..." display="chip" class="w-64" />
  </div>

  <div class="sikep-table-wrap">
    <p-table [value]="rows()" dataKey="id" styleClass="text-sm" [rowHover]="true" [paginator]="rows().length > 20" [rows]="20">
      <ng-template #header>
        <tr>
          <th>Nomor WO</th>
          <th>Kendaraan</th>
          <th>Pengajuan</th>
          <th class="w-28 text-center">Status</th>
          <th class="w-36 text-right">Nominal</th>
          <th>Selesai</th>
          <th>Divalidasi</th>
          <th class="w-20"></th>
        </tr>
      </ng-template>
      <ng-template #body let-w>
        <tr>
          <td class="font-mono font-medium">{{ w.nomor }}</td>
          <td>{{ w.vehiclePlate }}</td>
          <td class="text-xs text-slate-400">{{ w.pengajuanNomor }}</td>
          <td class="text-center"><p-tag [value]="statusLabel(w.status)" [severity]="statusSeverity(w.status)" /></td>
          <td class="text-right">{{ formatCurrency(w.totalNominal) }}</td>
          <td class="text-xs text-slate-400">{{ formatDate(w.completedAt) }}</td>
          <td class="text-xs text-slate-400">{{ formatDate(w.validatedAt) }}</td>
          <td><a [routerLink]="['/vendor/work-orders', w.id, 'draft']" class="text-primary-600 text-xs hover:underline">Detail</a></td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr><td colspan="8" class="text-center text-slate-400 py-8">Belum ada riwayat WO yang selesai.</td></tr>
      </ng-template>
    </p-table>
  </div>
</section>
