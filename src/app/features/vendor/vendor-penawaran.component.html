<section class="flex flex-col gap-4">
  <app-page-header
    [title]="'Penawaran & Invoice Vendor'"
    [subtitle]="'WO ' + workOrderId + ' - kelola penawaran, invoice, dan submit final.'"
  />

  <div class="flex gap-2 rounded-xl border border-slate-200 bg-white p-4">
    <input pInputText type="number" placeholder="Total biaya" [(ngModel)]="totalBiaya" />
    <input pInputText placeholder="Nomor invoice" [(ngModel)]="nomorInvoice" />
    <button pButton type="button" label="Buat Penawaran" (click)="buatPenawaran()"></button>
  </div>

  <p-table [value]="rows()" dataKey="id" [stripedRows]="true">
    <ng-template #header>
      <tr>
        <th>Versi</th>
        <th>Status</th>
        <th>Total</th>
        <th>Invoice</th>
        <th class="w-24">Aksi</th>
      </tr>
    </ng-template>
    <ng-template #body let-row>
      <tr>
        <td>{{ row.versi }}</td>
        <td>{{ row.status }}</td>
        <td>{{ row.totalBiaya.toLocaleString('id-ID') }}</td>
        <td>{{ row.nomorInvoice || '-' }}</td>
        <td>
          <button pButton type="button" label="Submit" size="small" [disabled]="row.status !== 'DRAFT'" (click)="submit(row.id)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>
