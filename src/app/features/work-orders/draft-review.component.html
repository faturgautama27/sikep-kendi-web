<section class="flex flex-col gap-4">
  <app-page-header
    [title]="'Review Draft Checklist'"
    [subtitle]="'Pengurus Barang melakukan approval/reject dengan catatan.'"
  />

  <p-table [value]="rows()" dataKey="id" [stripedRows]="true">
    <ng-template #header>
      <tr>
        <th>Versi</th>
        <th>Status</th>
        <th>Total</th>
        <th>Catatan Revisi</th>
      </tr>
    </ng-template>
    <ng-template #body let-row>
      <tr>
        <td>{{ row.versi }}</td>
        <td>{{ row.status }}</td>
        <td>{{ row.totalHarga.toLocaleString('id-ID') }}</td>
        <td>{{ row.notesRejection || '-' }}</td>
      </tr>
    </ng-template>
  </p-table>

  <div class="flex items-end gap-3 rounded-xl border border-slate-200 bg-white p-4">
    <div class="flex-1">
      <label class="mb-1 block text-xs font-medium text-slate-500">Catatan penolakan</label>
      <input pInputText class="w-full" [(ngModel)]="catatan" placeholder="Isi alasan jika ditolak" />
    </div>
    <button pButton type="button" label="Setujui" icon="pi pi-check" (click)="approve()"></button>
    <button pButton type="button" label="Tolak" icon="pi pi-times" severity="danger" (click)="reject()"></button>
  </div>
</section>
